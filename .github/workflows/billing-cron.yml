name: Billing Automation

on:
  # Executa todo dia às 6h da manhã
  schedule:
    - cron: '0 6 * * *'
  
  # Permite execução manual pelo GitHub Actions
  workflow_dispatch:

jobs:
  billing-automation:
    name: Run Billing Automation
    runs-on: ubuntu-latest
    steps:
      - name: Invoke billing automation
        run: |
          curl -X POST "${{ secrets.SUPABASE_URL }}/functions/v1/billing-automation" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{}'
        shell: bash
        
      - name: Log execution
        run: |
          echo "Billing automation executed at $(date)"
